description: >
  Evale dla promptu projektującego szkielet aplikacji
  "Slay the Spire 2 Combat Assistant" (Data Parser, Combat Engine, Overlay Simulator).

providers:
  # Skonfiguruj zmienną środowiskową OPENAI_API_KEY przed uruchomieniem evali.
  - id: openai:gpt-4o-mini

prompts:
  - id: combat-assistant-skeleton
    # Prompt do optymalizacji – przyjmuje zmienną {{task}} z opisu zadania.
    prompt: |
      Jesteś seniorem Python game-dev i projektujesz architekturę narzędzia
      "Slay the Spire 2 Combat Assistant".

      Na podstawie poniższego zadania zaprojektuj czytelną, modułową strukturę
      aplikacji z klasami, modułami i krótkimi przykładami użycia:

      Zadanie:
      {{task}}

      W odpowiedzi:
      - wydziel moduły (np. data_parser.py, combat_engine.py, overlay_simulator.py),
      - zdefiniuj klasy z kluczowymi polami i metodami,
      - pokaż przykładowy przepływ: wczytaj gamestate.json -> policz obrażenia -> pokaż w overlay,
      - zachowaj zwięzłość, ale bądź konkretny.

tests:
  - description: "Polski opis zadania – pełny szkielet"
    vars:
      task: >
        Zaprojektuj szkielet aplikacji w Pythonie działającej jako
        "Slay the Spire 2 Combat Assistant". Aplikacja ma składać się z trzech modułów:

        Data Parser: Klasa obsługująca dane wejściowe w formacie JSON (reprezentujące
        aktualną rękę gracza, energię oraz statusy przeciwników).

        Combat Engine: Logika obliczająca sumaryczne obrażenia, jakie gracz może zadać
        w bieżącej turze, biorąc pod uwagę: koszt energii kart, status "Strength"
        gracza oraz status "Vulnerable" przeciwnika.

        Overlay Simulator: Prosty interfejs w bibliotece Tkinter lub PyQt, który
        wyświetla te informacje w półprzezroczystym oknie typu "Always on Top".

        Uwzględnij strukturę klas dla Card (name, damage, energy_cost) oraz
        Enemy (hp, vulnerable_turns). Przygotuj przykładowy plik gamestate.json do testów.

  - description: "Wariant angielski – to samo zadanie"
    vars:
      task: >
        Design a Python application skeleton acting as a "Slay the Spire 2 Combat Assistant".
        The app should consist of three modules:

        Data Parser: class that handles JSON input representing the current hand,
        player energy and enemy statuses.

        Combat Engine: logic that computes the total damage the player can deal this turn,
        considering card energy cost, player Strength and enemy Vulnerable.

        Overlay Simulator: simple Tkinter or PyQt overlay that displays this information
        in a semi-transparent "Always on Top" window.

        Include class structures for Card (name, damage, energy_cost) and Enemy (hp, vulnerable_turns),
        and mention a sample gamestate.json for tests.

assertions:
  # Sprawdź, czy odpowiedź zawiera kluczowe moduły i klasy
  - type: contains
    value: "Data Parser"
  - type: contains
    value: "Combat Engine"
  - type: contains
    value: "Overlay Simulator"
  - type: contains
    value: "Card"
  - type: contains
    value: "Enemy"
  # Dodatkowy check na overlay w Tkinter/PyQt
  - type: contains
    value: "Tkinter"
    weight: 0.5
  - type: contains
    value: "PyQt"
    weight: 0.5
